app:
  name: "Sussurro"
  debug: false
  log_level: "info" # debug, info, warn, error

audio:
  sample_rate: 16000
  channels: 1
  bit_depth: 16
  buffer_size: 1024
  max_duration: "60s"

models:
  asr:
    path: "models/ggml-base.bin"
    type: "whisper"
    threads: 4
    language: "en"
  llm:
    path: "models/qwen3-sussurro-q4_k_m.gguf"
    context_size: 32768
    gpu_layers: 0
    threads: 4

hotkey:
  trigger: "ctrl+shift+space"
  mode: "push-to-talk" # push-to-talk or toggle

injection:
  method: "keyboard"
